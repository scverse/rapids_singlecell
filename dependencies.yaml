files:
  pyproject:
    output: pyproject
    pyproject_dir: .
    extras:
      table: project.optional-dependencies
      key: rapids
    includes:
      - rapids

dependencies:
  rapids:
    specific:
      - output_types: pyproject
        matrices:
          - matrix:
              cuda: "12.*"
            packages:
              - cupy-cuda12x
              - cudf-cu12>=25.10
              - cuml-cu12>=25.10
              - cugraph-cu12>=25.10
              - cuvs-cu12>=25.10
          - matrix:
              cuda: "13.*"
            packages:
              - cupy-cuda13x
              - cudf-cu13>=25.10
              - cuml-cu13>=25.10
              - cugraph-cu13>=25.10
              - cuvs-cu13>=25.10
          - matrix:
            packages: []
